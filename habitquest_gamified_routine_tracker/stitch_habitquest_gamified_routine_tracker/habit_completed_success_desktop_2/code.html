<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HabitQuest - Quest Completed</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "outline": "#787586",
                        "text-muted": "#94A3B8",
                        "on-tertiary-fixed-variant": "#464555",
                        "on-background": "#1c1b23",
                        "surface-bright": "#fcf8ff",
                        "surface": "#fcf8ff",
                        "on-tertiary-fixed": "#1b1a28",
                        "error-container": "#ffdad6",
                        "background": "#fcf8ff",
                        "outline-variant": "#c8c4d7",
                        "on-surface": "#1c1b23",
                        "on-error": "#ffffff",
                        "dark-bg": "#0F172A",
                        "xp-gold": "#FBBF24",
                        "on-secondary-fixed": "#120068",
                        "tertiary-fixed": "#e4e0f4",
                        "badge-pink": "#EC4899",
                        "surface-container-highest": "#e5e0ed",
                        "inverse-surface": "#312f38",
                        "info-blue": "#3B82F6",
                        "surface-tint": "#5847d2",
                        "surface-variant": "#e5e0ed",
                        "tertiary-fixed-dim": "#c8c4d7",
                        "streak-orange": "#F97316",
                        "text-primary": "#0F172A",
                        "quest-blue": "#38BDF8",
                        "secondary-fixed-dim": "#c4c0ff",
                        "primary": "#5341cd",
                        "dark-border": "#334155",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#ebe6f2",
                        "on-secondary-container": "#fffbff",
                        "primary-container": "#6c5ce7",
                        "dark-surface": "#1E293B",
                        "warning-amber": "#F59E0B",
                        "tertiary-container": "#727081",
                        "surface-dim": "#dcd8e4",
                        "secondary-container": "#6960ee",
                        "text-secondary": "#64748B",
                        "inverse-primary": "#c6bfff",
                        "secondary-fixed": "#e3dfff",
                        "primary-fixed-dim": "#c6bfff",
                        "border-neutral": "#E2E8F0",
                        "tertiary": "#595868",
                        "card-surface": "#FFFFFF",
                        "surface-container": "#f0ecf8",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "error-red": "#EF4444",
                        "on-secondary-fixed-variant": "#3929be",
                        "primary-fixed": "#e4dfff",
                        "inverse-on-surface": "#f3effb",
                        "on-primary-fixed-variant": "#4029ba",
                        "on-surface-variant": "#474554",
                        "on-primary-container": "#faf6ff",
                        "on-tertiary-container": "#fbf6ff",
                        "surface-container-low": "#f6f2fe",
                        "secondary": "#5045d4",
                        "success-green": "#22C55E",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#160066",
                        "app-bg": "#F8FAFC"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "tiny": "4px",
                        "sidebar-width": "240px",
                        "hero": "48px",
                        "xl": "32px",
                        "sm": "12px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "8px",
                        "grid-gutter": "24px"
                    },
                    "fontFamily": {
                        "card-heading": ["Inter"],
                        "hero-heading-mobile": ["Plus Jakarta Sans"],
                        "section-heading": ["Plus Jakarta Sans"],
                        "hero-heading": ["Plus Jakarta Sans"],
                        "page-heading-mobile": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "page-heading": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "card-heading": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "hero-heading-mobile": ["42px", { "lineHeight": "1.1", "fontWeight": "800" }],
                        "section-heading": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "hero-heading": ["64px", { "lineHeight": "1.1", "fontWeight": "800" }],
                        "page-heading-mobile": ["30px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["13px", { "lineHeight": "1", "fontWeight": "500" }],
                        "page-heading": ["36px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-app-bg text-text-primary font-body-md h-screen flex flex-col overflow-hidden">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-dark-bg/40 z-50 flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="relative bg-surface-container-lowest rounded-xl shadow-lg max-w-[480px] w-full p-xl text-center overflow-hidden transform transition-all">
<!-- Background Decorative Element (Progress Bar Hint) -->
<div class="absolute inset-x-0 bottom-0 h-2 bg-surface-container-high">
<div class="h-full bg-success-green w-3/4 rounded-r-full"></div>
</div>
<!-- Top Icons / Gamification Visuals -->
<div class="flex justify-center items-end gap-sm mb-lg">
<!-- Streak Flame -->
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-streak-orange text-5xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-sm text-label-sm text-streak-orange font-bold mt-xs">5 Day Streak!</span>
</div>
<!-- Floating XP -->
<div class="flex flex-col items-center transform -translate-y-4">
<div class="bg-xp-gold/10 rounded-full p-sm mb-xs">
<span class="material-symbols-outlined text-xp-gold text-4xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<span class="font-card-heading text-card-heading text-xp-gold">+20 XP</span>
</div>
</div>
<!-- Content -->
<h2 class="font-page-heading text-page-heading text-primary mb-sm">Nice work!</h2>
<p class="font-body-md text-body-md text-text-secondary mb-xl max-w-[80%] mx-auto">
                You earned 20 XP and kept your streak alive.
            </p>
<!-- Actions -->
<button class="w-full bg-primary text-on-primary font-card-heading text-card-heading py-md rounded-[16px] hover:bg-secondary transition-colors mb-sm shadow-md">
                Continue Your Quest
            </button>
<button class="w-full text-text-secondary font-label-sm text-label-sm py-sm rounded-lg hover:bg-surface-container-low transition-colors">
                View Quest Log
            </button>
</div>
</div>
</body></html>
