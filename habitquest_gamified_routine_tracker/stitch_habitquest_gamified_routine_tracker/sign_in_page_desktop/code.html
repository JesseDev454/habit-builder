<!DOCTYPE html>

        tailwind.config = {

<body class="bg-app-bg text-text-primary min-h-screen flex items-center justify-center p-md md:p-xl">
<div class="bg-card-surface shadow-[0px_4px_12px_rgba(15,23,42,0.05)] rounded-[24px] w-full max-w-[1200px] flex flex-col lg:flex-row overflow-hidden min-h-[700px]">
<!-- Left Content: Form -->
<div class="w-full lg:w-1/2 p-xl lg:p-[64px] flex flex-col justify-center">
<div class="mb-xl">
<div class="flex items-center gap-sm mb-lg">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-page-heading text-section-heading text-primary tracking-tight">HabitQuest</span>
</div>
<h1 class="font-page-heading text-page-heading mb-xs text-text-primary">Welcome back, quester.</h1>
<p class="font-body-md text-body-md text-text-secondary">Pick up where you left off and keep your streak alive.</p>
</div>
<!-- Error State -->
<div class="bg-error-container text-on-error-container p-md rounded-lg flex items-center gap-sm mb-lg">
<span class="material-symbols-outlined">error</span>
<span class="font-body-md text-body-md">Invalid email or password</span>
</div>
<form class="flex flex-col gap-md mb-lg">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-text-primary" for="email">Email</label>
<input class="h-[48px] rounded-[12px] border-border-neutral focus:border-primary focus:ring-1 focus:ring-primary px-sm font-body-md text-body-md" id="email" placeholder="Enter your email" type="email" value="quester@habitquest.app"/>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-text-primary" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<input class="h-[48px] rounded-[12px] border-error focus:border-error focus:ring-1 focus:ring-error px-sm font-body-md text-body-md" id="password" placeholder="Enter your password" type="password"/>
</div>
<div class="flex items-center gap-xs">
<input class="rounded text-primary focus:ring-primary border-border-neutral w-5 h-5" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-text-secondary cursor-pointer" for="remember">Remember me</label>
</div>
<button class="mt-xs bg-primary text-on-primary h-[48px] rounded-xl font-label-sm text-label-sm flex items-center justify-center transition-transform hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:scale-95 duration-200" type="button">
                    Continue Your Quest
                </button>
</form>
<div class="flex items-center gap-md mb-lg">
<div class="flex-1 h-px bg-border-neutral"></div>
<span class="font-label-sm text-label-sm text-text-muted uppercase tracking-wider">Or</span>
<div class="flex-1 h-px bg-border-neutral"></div>
</div>
<button class="w-full h-[48px] rounded-xl border border-border-neutral flex items-center justify-center gap-sm font-label-sm text-label-sm text-text-primary hover:bg-surface-container-low transition-colors mb-xl" type="button">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClJ_4klgj1FEOMMZ9_ZbVDgXTBE79Q_eozbnJkmWNmtHaZkASIpAJteWJmbHsn2dq--PrDZCAENJej67GM9XDhXxUDJddZDV4bRCHr92f7Etg-rzG6A-Njy39gjfcr-hFwrAckBYG3kGpBSGRZavN6xgrfFq0p7_iJqWazKeAmKLN5dK9V-f58m_VzyJY5kyYYdPLaL9L5WWCyZ-vLRTPgkcLDO-IUuBNpKwCob-kl2oz1wFaplBryLSCZ-bQYLug88xtYVy8Nh995"/>
                Continue with Google
            </button>
<div class="text-center">
<a class="font-body-md text-body-md text-text-secondary hover:text-primary transition-colors" href="#">New to HabitQuest? <span class="font-semibold text-primary">Create an account</span></a>
</div>
</div>
<!-- Right Content: Motivational Preview -->
<div class="hidden lg:flex w-1/2 bg-surface-container p-xl flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary opacity-5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-streak-orange opacity-5 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4"></div>
<!-- Preview Card -->
<div class="bg-card-surface rounded-[24px] p-xl shadow-lg w-full max-w-[400px] flex flex-col items-center gap-lg relative z-10 hover:-translate-y-1 hover:shadow-[0px_12px_24px_rgba(15,23,42,0.1)] transition-all duration-300">
<h2 class="font-page-heading text-section-heading text-text-primary text-center">Your streak is waiting.</h2>
<div class="flex flex-col items-center gap-sm">
<div class="w-24 h-24 bg-surface-container-low rounded-full flex items-center justify-center shadow-inner relative">
<!-- Simulated Circular Progress -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="#E2E8F0" stroke-width="8"></circle>
<circle class="transition-all duration-1000" cx="50" cy="50" fill="none" r="45" stroke="#F97316" stroke-dasharray="283" stroke-dashoffset="70" stroke-width="8"></circle>
</svg>
<span class="material-symbols-outlined text-[48px] text-streak-orange relative z-10" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div class="flex items-baseline gap-xs">
<span class="font-hero-heading-mobile text-hero-heading-mobile text-text-primary">14</span>
<span class="font-label-sm text-label-sm text-text-secondary uppercase tracking-widest">Days</span>
</div>
</div>
<div class="w-full bg-surface-container-high rounded-full h-sm overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-xp-gold w-[75%] rounded-full shadow-[0_0_10px_rgba(251,191,36,0.5)]"></div>
</div>
<div class="flex justify-between w-full font-label-sm text-label-sm">
<span class="text-text-secondary">Level 14</span>
<span class="text-xp-gold font-bold flex items-center gap-tiny">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        3,450 XP
                    </span>
</div>
</div>
</div>
</div>
</body></html>
