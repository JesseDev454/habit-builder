<body class="bg-app-bg text-text-primary antialiased h-screen w-full flex items-center justify-center relative overflow-hidden">
<!-- Ambient background layer to simulate the dashboard behind the modal -->
<div class="absolute inset-0 z-0 bg-surface-container opacity-50 blur-sm"></div>
<!-- Backdrop overlay -->
<div class="fixed inset-0 bg-dark-surface/40 backdrop-blur-sm z-40 transition-opacity flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="bg-card-surface rounded-[24px] shadow-2xl w-full max-w-md relative z-50 overflow-hidden transform transition-all border border-border-neutral/30">
<!-- Confetti/Sparkle Background Effect (CSS Gradient simulation) -->
<div class="absolute top-0 left-0 right-0 h-48 bg-gradient-to-b from-badge-pink/10 to-transparent pointer-events-none">
<!-- Sparkle Icons scattered -->
<span class="material-symbols-outlined absolute top-6 left-8 text-badge-pink/40 text-[24px]" style="font-variation-settings: 'FILL' 1;">temp_preferences_custom</span>
<span class="material-symbols-outlined absolute top-12 right-10 text-xp-gold/60 text-[32px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined absolute top-24 left-16 text-quest-blue/50 text-[20px]" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
<span class="material-symbols-outlined absolute top-8 right-24 text-success-green/40 text-[18px]" style="font-variation-settings: 'FILL' 1;">temp_preferences_custom</span>
</div>
<!-- Modal Content -->
<div class="p-xl flex flex-col items-center text-center relative z-10 pt-hero">
<!-- Badge Graphic -->
<div class="w-32 h-32 mb-lg relative">
<div class="absolute inset-0 bg-badge-pink/20 rounded-full blur-xl animate-pulse"></div>
<div class="w-full h-full bg-gradient-to-br from-surface-bright to-surface-container-highest rounded-full shadow-lg border-4 border-card-surface flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-[64px] text-badge-pink drop-shadow-md" style="font-variation-settings: 'FILL' 1;">swords</span>
</div>
</div>
<!-- Text Content -->
<h2 class="font-page-heading text-page-heading text-text-primary mb-sm tracking-tight">Achievement Unlocked!</h2>
<div class="bg-surface-container-highest/50 px-md py-xs rounded-full mb-md flex items-center gap-xs">
<span class="material-symbols-outlined text-badge-pink text-[16px]" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label-sm text-label-sm text-text-secondary uppercase tracking-wider">Weekly Warrior</span>
</div>
<p class="font-body-md text-body-md text-text-secondary mb-xl max-w-[280px]">
                    You've completed every habit for 7 days straight!
                </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-sm text-label-sm py-sm rounded-xl transition-colors duration-200 shadow-md hover:shadow-lg flex items-center justify-center gap-xs h-[48px]">
                        View All Achievements
                    </button>
<button class="w-full bg-transparent hover:bg-surface-container-low text-text-secondary font-label-sm text-label-sm py-sm rounded-xl transition-colors duration-200 h-[48px]">
                        Close
                    </button>
</div>
</div>
