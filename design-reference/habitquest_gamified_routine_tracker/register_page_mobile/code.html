<body class="bg-app-bg text-text-primary min-h-screen flex flex-col items-center justify-center p-md font-body-md antialiased">
<!-- Transactional Page: Navigation Shells Suppressed -->
<!-- Main Container -->
<div class="w-full max-w-[420px] flex flex-col items-center gap-lg animate-fade-in-up">
<!-- Header / Brand -->
<div class="text-center flex flex-col items-center gap-xs">
<div class="w-[64px] h-[64px] bg-primary-container rounded-2xl flex items-center justify-center text-on-primary-container rotate-3 mb-sm shadow-[0_4px_12px_rgba(83,65,205,0.2)]">
<span class="material-symbols-outlined text-[36px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<h1 class="font-page-heading text-page-heading-mobile text-primary tracking-tight">HabitQuest</h1>
<p class="font-body-md text-body-md text-text-secondary">Level up your daily routine.</p>
</div>
<!-- Registration Form Card -->
<div class="bg-card-surface w-full rounded-xl shadow-[0px_4px_12px_rgba(15,23,42,0.05)] p-lg flex flex-col gap-md border border-border-neutral/50">
<form class="flex flex-col gap-md">
<!-- Full Name Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="fullName">Full Name</label>
<input class="h-hero rounded-xl border border-border-neutral bg-surface-container-lowest text-body-md text-text-primary px-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" id="fullName" placeholder="e.g. Alex Hunter" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
<input class="h-hero rounded-xl border border-border-neutral bg-surface-container-lowest text-body-md text-text-primary px-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" id="email" placeholder="hero@habitquest.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="h-hero w-full rounded-xl border border-border-neutral bg-surface-container-lowest text-body-md text-text-primary pl-md pr-[48px] focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 w-[32px] h-[32px] flex items-center justify-center text-text-muted hover:text-text-primary transition-colors rounded-full hover:bg-surface-container" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="confirmPassword">Confirm Password</label>
<input class="h-hero w-full rounded-xl border border-border-neutral bg-surface-container-lowest text-body-md text-text-primary px-md focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-sm mt-tiny">
<div class="flex items-center h-[20px]">
<input class="w-5 h-5 rounded-[4px] text-primary border-border-neutral focus:ring-primary focus:ring-2 focus:ring-offset-1 transition-colors cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-[1.4] cursor-pointer pt-[2px]" for="terms">
                        I agree to the <a class="text-primary hover:text-surface-tint font-bold transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-surface-tint font-bold transition-colors" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full h-hero bg-primary text-on-primary rounded-xl font-card-heading text-card-heading flex items-center justify-center hover:bg-surface-tint transition-all shadow-[0_4px_12px_rgba(83,65,205,0.2)] hover:shadow-[0_6px_16px_rgba(83,65,205,0.3)] hover:-translate-y-[1px] mt-xs" type="submit">
                    Create Account
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-border-neutral"></div>
<span class="flex-shrink-0 mx-sm font-label-sm text-label-sm text-text-muted">or</span>
<div class="flex-grow border-t border-border-neutral"></div>
</div>
<!-- Social Authentication -->
<button class="w-full h-hero bg-surface-container-lowest border border-border-neutral text-text-primary rounded-xl font-card-heading text-card-heading flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<!-- Generic Google Icon representation using Material Symbols since we can't embed external SVG easily without clutter -->
<span class="material-symbols-outlined text-[20px] text-text-primary">account_circle</span>
                Continue with Google
            </button>
</div>
<!-- Footer Link -->
<p class="font-label-sm text-label-sm text-on-surface-variant">
            Already have an account? <a class="text-primary font-bold hover:text-surface-tint transition-colors" href="#">Sign in</a>
</p>
</div>
