<body class="bg-app-bg text-text-primary antialiased min-h-screen flex flex-col items-center justify-center p-md">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center mb-xl text-center">
<div class="flex items-center justify-center w-16 h-16 bg-surface-container-low rounded-2xl mb-md shadow-sm">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<h1 class="font-hero-heading-mobile text-hero-heading-mobile text-primary tracking-tight">HabitQuest</h1>
<p class="font-body-md text-body-md text-text-secondary mt-xs">Turn your daily routine into an epic adventure.</p>
</header>
<!-- Login Card -->
<main class="w-full max-w-sm bg-card-surface rounded-[16px] p-lg shadow-[0_4px_12px_rgba(15,23,42,0.05)] border border-border-neutral/50">
<h2 class="font-card-heading text-card-heading text-text-primary mb-lg">Welcome Back, Explorer!</h2>
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-text-muted text-[20px]">mail</span>
<input class="w-full h-[48px] pl-[40px] pr-md bg-surface border border-border-neutral rounded-[12px] font-body-md text-body-md text-text-primary placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" name="email" placeholder="hero@habitquest.app" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-text-muted text-[20px]">lock</span>
<input class="w-full h-[48px] pl-[40px] pr-md bg-surface border border-border-neutral rounded-[12px] font-body-md text-body-md text-text-primary placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between mt-tiny mb-sm">
<div class="flex items-center gap-xs">
<input class="w-4 h-4 text-primary border-border-neutral rounded-[4px] focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-text-secondary cursor-pointer" for="remember">Remember me</label>
</div>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors font-semibold" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full h-[48px] bg-primary text-on-primary font-label-sm text-label-sm rounded-[16px] shadow-sm hover:-translate-y-0.5 hover:shadow-md active:translate-y-0 transition-all flex items-center justify-center gap-xs" type="submit">
                Continue Your Quest
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-lg">
<div class="h-px bg-border-neutral flex-1"></div>
<span class="font-label-sm text-label-sm text-text-muted">or</span>
<div class="h-px bg-border-neutral flex-1"></div>
</div>
<!-- Social CTA -->
<button class="w-full h-[48px] bg-surface-container-low text-primary border border-surface-dim font-label-sm text-label-sm rounded-[16px] hover:bg-surface-container-high transition-colors flex items-center justify-center gap-sm" type="button">
<img alt="Google Logo" class="w-5 h-5" data-alt="The iconic Google 'G' logo, composed of red, yellow, green, and blue segments in a clean, flat vector style. The logo represents authentication and trust in modern digital interfaces. It is set against a bright, minimalist background to maintain a high-key aesthetic. The visual is simple, recognizable, and optimized for high-fidelity UI design." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8KrL-7-KD3px-y3xGD8mlgeI7pnS6RrZlawtVaWXu5erQ2z7TTdYu_krqseURlBIQxMqXBZmERn7iqyD6456qbqfvIkYq9by5NoeHAtq0h9X3iHAQ2oHkcYVNbA1fr6fuWv0zKz9wSrfw92TWgsdznRchjOWpTGatCwNlg-6-3-tsMxlkilZ99UxbhVGSht17KOjrg-q8gQZ76sbu8nnFuY4Zhsw6r5LoZKJblM4wOx94OhgfVt8xgPgWJO4qDuiftq0r6jCxNVZZ"/>
            Continue with Google
        </button>
</main>

<footer class="mt-lg text-center">
<p class="font-body-md text-body-md text-text-secondary">
            New to HabitQuest? 
            <a class="font-label-sm text-label-sm text-primary font-semibold hover:underline ml-xs" href="#">Start your journey</a>
</p>
</footer>
