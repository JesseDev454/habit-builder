            -ms-overflow-style: none;

<body class="bg-app-bg text-text-primary font-body-md h-screen flex flex-col antialiased">
<!-- Progress Indicator -->
<header class="pt-12 px-md pb-4 flex justify-between items-center bg-app-bg shrink-0">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-text-secondary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-8 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto no-scrollbar px-md pb-32">
<div class="max-w-md mx-auto w-full pt-4">
<div class="text-center mb-8">
<h1 class="font-page-heading-mobile text-page-heading-mobile text-text-primary mb-2">What do you want to build?</h1>
<p class="text-text-secondary font-body-md text-body-md">Select your first quest category to get started.</p>
</div>
<!-- Goal Cards Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Selected Card -->
<button class="bg-primary-container border-2 border-primary rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(83,65,205,0.2)] hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container-lowest rounded-full flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined text-3xl" data-icon="school" data-weight="fill" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<span class="font-card-heading text-card-heading text-on-primary-container">Study</span>
</button>
<!-- Unselected Card -->
<button class="bg-card-surface border border-border-neutral rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:shadow-md hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="terminal">terminal</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Coding</span>
</button>
<!-- Unselected Card -->
<button class="bg-card-surface border border-border-neutral rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:shadow-md hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Reading</span>
</button>
<!-- Unselected Card -->
<button class="bg-card-surface border border-border-neutral rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:shadow-md hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="fitness_center">fitness_center</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Fitness</span>
</button>
<!-- Unselected Card -->
<button class="bg-card-surface border border-border-neutral rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:shadow-md hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="self_improvement">self_improvement</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Mindfulness</span>
</button>
<!-- Unselected Card -->
<button class="bg-card-surface border border-border-neutral rounded-xl p-4 flex flex-col items-center justify-center gap-3 shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:shadow-md hover:-translate-y-1 transition-all">
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="palette">palette</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Creative</span>
</button>
</div>
</div>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-app-bg via-app-bg to-transparent pt-8 pb-6 px-md shrink-0 z-50">
<div class="max-w-md mx-auto flex flex-col gap-3">
<button class="w-full bg-primary text-on-primary font-card-heading text-card-heading py-4 rounded-xl shadow-lg hover:bg-surface-tint active:scale-95 transition-all">
                Continue
            </button>
<button class="w-full text-text-secondary font-label-sm text-label-sm py-3 hover:text-text-primary transition-colors">
                Skip for Now
            </button>
</div>
</footer>
