<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HabitQuest - Goal-Based Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

                extend: {
                    "colors": {

                        "quest-blue": "#38BDF8",
                        "surface-container": "#f0ecf8",
                        "surface": "#fcf8ff",
                        "on-tertiary-fixed-variant": "#464555",
                        "secondary-fixed": "#e3dfff",
                        "dark-surface": "#1E293B",
                        "surface-dim": "#dcd8e4",
                        "error-container": "#ffdad6",
                        "primary": "#5341cd",
                        "primary-fixed": "#e4dfff",
                        "tertiary-container": "#727081",
                        "on-primary": "#ffffff",
                        "warning-amber": "#F59E0B",
                        "dark-bg": "#0F172A",
                        "xp-gold": "#FBBF24",
                        "info-blue": "#3B82F6",

                    "borderRadius": {

                    "spacing": {

                    "fontFamily": {

<style>
        body {
            background-color: #F8FAFC; /* app-bg */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-app-bg text-text-primary min-h-screen flex flex-col font-body-md">
<!-- Top AppBar (Mobile Only for Onboarding context, stripped down) -->
<header class="bg-surface-container-lowest text-primary font-page-heading text-card-heading shadow-sm flex justify-between items-center h-16 px-md w-full z-40 lg:hidden">
<div class="flex items-center gap-2">
<!-- Back Button Context -->
<button class="p-2 text-text-secondary hover:bg-surface-container-low rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<span class="font-page-heading text-section-heading font-extrabold text-primary">HabitQuest</span>
</div>
<div class="text-text-secondary font-label-sm text-label-sm">
            Step 1 of 2
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col px-md py-lg max-w-md mx-auto w-full lg:max-w-2xl lg:py-xl lg:px-lg">
<!-- Header Section -->
<div class="mb-lg lg:mb-xl text-center lg:text-left">
<h1 class="font-page-heading-mobile text-page-heading-mobile lg:font-page-heading lg:text-page-heading text-text-primary mb-xs">What do you want to build?</h1>
<p class="font-body-md text-body-md text-text-secondary">Choose your focus areas to customize your quest.</p>
</div>
<!-- Goal Cards Grid (2-column on mobile, up to 3 on larger screens) -->
<div class="grid grid-cols-2 gap-sm lg:gap-md mb-xl flex-grow content-start">
<!-- Card 1: Fitness -->
<button class="bg-card-surface border-2 border-border-neutral rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:border-primary hover:shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center text-primary mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Fitness</span>
</button>
<!-- Card 2: Learning (Active State Example) -->
<button class="bg-surface-container-low border-2 border-primary rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none ring-2 ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-primary text-on-primary flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<span class="font-card-heading text-card-heading text-primary font-bold">Learning</span>
</button>
<!-- Card 3: Mindfulness -->
<button class="bg-card-surface border-2 border-border-neutral rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:border-primary hover:shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-tertiary mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Mindfulness</span>
</button>
<!-- Card 4: Career -->
<button class="bg-card-surface border-2 border-border-neutral rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:border-primary hover:shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-tertiary mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Career</span>
</button>
<!-- Card 5: Finance -->
<button class="bg-card-surface border-2 border-border-neutral rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:border-primary hover:shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-tertiary mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">savings</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Finance</span>
</button>
<!-- Card 6: Creativity -->
<button class="bg-card-surface border-2 border-border-neutral rounded-xl p-md flex flex-col items-center justify-center gap-xs shadow-[0_4px_12px_rgba(15,23,42,0.05)] hover:border-primary hover:shadow-md transition-all duration-200 active:scale-95 text-center focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-tertiary mb-sm">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">palette</span>
</div>
<span class="font-card-heading text-card-heading text-text-primary">Creativity</span>
</button>
</div>
<!-- Sticky Bottom Actions -->
<div class="mt-auto pt-md bg-app-bg pb-md lg:pb-0">
<div class="flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary font-label-sm text-label-sm py-4 rounded-xl shadow-md hover:bg-secondary-container hover:-translate-y-0.5 transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                    Continue
                </button>
<button class="w-full bg-transparent text-text-secondary font-label-sm text-label-sm py-3 rounded-xl hover:bg-surface-container-low transition-colors duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-outline focus:ring-offset-2">
                    Skip for Now
                </button>
</div>
</div>
</main>
<!-- Suppressed BottomNavBar & SideNavBar contextually as per instructions -->
</body></html>
