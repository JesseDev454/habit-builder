<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HabitQuest - Success Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#faf6ff",
                        "on-tertiary-container": "#fbf6ff",
                        "on-tertiary-fixed": "#1b1a28",
                        "text-secondary": "#64748B",
                        "error": "#ba1a1a",
                        "secondary": "#5045d4",
                        "card-surface": "#FFFFFF",
                        "on-error": "#ffffff",
                        "inverse-surface": "#312f38",
                        "surface-bright": "#fcf8ff",
                        "app-bg": "#F8FAFC",
                        "surface-container-low": "#f6f2fe",
                        "tertiary": "#595868",
                        "text-muted": "#94A3B8",
                        "on-error-container": "#93000a",
                        "on-background": "#1c1b23",
                        "outline": "#787586",
                        "surface-container-highest": "#e5e0ed",
                        "secondary-fixed-dim": "#c4c0ff",
                        "inverse-on-surface": "#f3effb",
                        "on-primary-fixed": "#160066",
                        "tertiary-fixed": "#e4e0f4",
                        "on-primary-fixed-variant": "#4029ba",
                        "dark-border": "#334155",
                        "on-secondary-container": "#fffbff",
                        "surface-container-lowest": "#ffffff",
                        "quest-blue": "#38BDF8",
                        "surface-container": "#f0ecf8",
                        "surface": "#fcf8ff",
                        "on-tertiary-fixed-variant": "#464555",
                        "secondary-fixed": "#e3dfff",
                        "dark-surface": "#1E293B",
                        "surface-dim": "#dcd8e4",
                        "error-container": "#ffdad6",
                        "primary": "#5341cd",
                        "primary-fixed": "#e4dfff",
                        "tertiary-container": "#727081",
                        "on-primary": "#ffffff",
                        "warning-amber": "#F59E0B",
                        "dark-bg": "#0F172A",
                        "xp-gold": "#FBBF24",
                        "info-blue": "#3B82F6",
                        "background": "#fcf8ff",
                        "on-secondary-fixed-variant": "#3929be",
                        "primary-fixed-dim": "#c6bfff",
                        "on-surface-variant": "#474554",
                        "badge-pink": "#EC4899",
                        "success-green": "#22C55E",
                        "error-red": "#EF4444",
                        "on-secondary": "#ffffff",
                        "border-neutral": "#E2E8F0",
                        "inverse-primary": "#c6bfff",
                        "surface-variant": "#e5e0ed",
                        "tertiary-fixed-dim": "#c8c4d7",
                        "surface-tint": "#5847d2",
                        "on-surface": "#1c1b23",
                        "on-tertiary": "#ffffff",
                        "streak-orange": "#F97316",
                        "on-secondary-fixed": "#120068",
                        "text-primary": "#0F172A",
                        "surface-container-high": "#ebe6f2",
                        "primary-container": "#6c5ce7",
                        "outline-variant": "#c8c4d7",
                        "secondary-container": "#6960ee"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "md": "16px",
                        "xl": "32px",
                        "sidebar-width": "240px",
                        "sm": "12px",
                        "hero": "48px",
                        "xs": "8px",
                        "grid-gutter": "24px",
                        "tiny": "4px"
                    },
                    "fontFamily": {
                        "section-heading": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "page-heading-mobile": ["Plus Jakarta Sans"],
                        "page-heading": ["Plus Jakarta Sans"],
                        "hero-heading-mobile": ["Plus Jakarta Sans"],
                        "card-heading": ["Inter"],
                        "body-md": ["Inter"],
                        "hero-heading": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "section-heading": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["13px", { "lineHeight": "1", "fontWeight": "500" }],
                        "page-heading-mobile": ["30px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "page-heading": ["36px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "hero-heading-mobile": ["42px", { "lineHeight": "1.1", "fontWeight": "800" }],
                        "card-heading": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "hero-heading": ["64px", { "lineHeight": "1.1", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-app-bg text-text-primary min-h-screen relative font-body-md overflow-hidden">
<!-- Mock Dashboard Background (Blurred) -->
<div class="fixed inset-0 z-0 bg-app-bg filter blur-sm pointer-events-none opacity-50">
<!-- Top App Bar Mock -->
<header class="flex justify-between items-center h-16 px-lg w-full bg-surface-container-lowest shadow-sm border-b border-border-neutral">
<div class="font-page-heading text-section-heading font-extrabold text-primary">HabitQuest</div>
</header>
<!-- Side Nav & Content Area Mock -->
<div class="flex h-[calc(100vh-64px)]">
<nav class="hidden lg:flex flex-col h-full p-md gap-md overflow-y-auto w-sidebar-width bg-surface-container-lowest shadow-md">
<div class="bg-primary-container text-on-primary-container rounded-xl font-bold p-3">Dashboard</div>
</nav>
<main class="flex-1 p-xl">
<div class="grid grid-cols-3 gap-grid-gutter">
<div class="bg-card-surface rounded-xl p-md h-48 border border-border-neutral"></div>
<div class="bg-card-surface rounded-xl p-md h-48 border border-border-neutral"></div>
<div class="bg-card-surface rounded-xl p-md h-48 border border-border-neutral"></div>
</div>
</main>
</div>
</div>
<!-- Overlay Backdrop -->
<div class="fixed inset-0 z-50 bg-text-primary/30 backdrop-blur-md flex items-center justify-center p-md">
<!-- Success Modal / Toast -->
<div class="bg-card-surface rounded-[24px] shadow-[0_20px_40px_rgba(15,23,42,0.15)] max-w-md w-full overflow-hidden flex flex-col items-center p-xl relative">
<!-- Close Button (Ghost) -->
<button aria-label="Close modal" class="absolute top-md right-md text-text-secondary hover:bg-surface-container-low rounded-full p-2 transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<!-- Celebratory Visuals -->
<div class="flex items-center justify-center gap-md mb-lg">
<!-- Streak Flame -->
<div class="relative flex items-center justify-center w-20 h-20 bg-streak-orange/10 rounded-full">
<span class="material-symbols-outlined text-[48px] text-streak-orange" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<!-- Sparkle accents -->
<span class="material-symbols-outlined absolute -top-1 -right-1 text-[20px] text-streak-orange">colors_spark</span>
</div>
<!-- Plus separator -->
<span class="material-symbols-outlined text-text-secondary text-[24px]">add</span>
<!-- XP Sparkle -->
<div class="relative flex items-center justify-center w-20 h-20 bg-xp-gold/10 rounded-full">
<span class="material-symbols-outlined text-[48px] text-xp-gold" style="font-variation-settings: 'FILL' 1;">stars</span>
<!-- Sparkle accents -->
<span class="material-symbols-outlined absolute -bottom-1 -left-1 text-[20px] text-xp-gold">flare</span>
</div>
</div>
<!-- Typography Content -->
<h2 class="font-page-heading text-page-heading text-center mb-sm">Nice work, Alex!</h2>
<p class="font-body-md text-body-md text-text-secondary text-center mb-xl max-w-[80%]">
                You earned <strong class="text-xp-gold font-bold">+20 XP</strong> and kept your streak alive.
            </p>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary font-card-heading text-card-heading py-4 px-lg rounded-xl hover:bg-primary-container hover:shadow-lg transition-all transform active:scale-[0.98]">
                Continue Your Quest
            </button>
</div>
</div>
</body></html>
